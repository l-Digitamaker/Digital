<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوات زفاف احترافية</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal&family=Aref+Ruqaa&display=swap" rel="stylesheet">

<style>
body{font-family:'Tajawal',sans-serif;margin:0}
.section{display:none;min-height:100vh;padding:20px}
.active{display:block}

/* ===== LUXURY ===== */
.luxury{background:#FAFAFA;color:#333}
.luxury .box{background:#fff;padding:20px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.luxury .title{color:#B8860B}

/* ===== ROMANTIC ===== */
.romantic{background:linear-gradient(#fff,#ffecec)}
.romantic .box{background:#fff;border-radius:20px;padding:20px}
.romantic .title{color:#d46a6a}

/* ===== MINIMAL ===== */
.minimal{background:#fff;color:#000}
.minimal .box{border:1px solid #eee;padding:20px;border-radius:15px}
.minimal .title{font-weight:bold}

/* ===== ROYAL ===== */
.royal{background:#111;color:#fff}
.royal .box{background:rgba(255,255,255,.05);padding:20px;border-radius:20px}
.royal .title{color:#FFD700}

/* ===== SHARED ===== */
.parallax{height:220px;background-size:cover;border-radius:20px;margin-bottom:20px}
.counter{display:flex;justify-content:center;gap:10px;margin-top:10px}
.counter div{background:#eee;padding:10px;border-radius:10px}
.royal .counter div{background:#222}

.btn{margin-top:15px;padding:10px;border-radius:25px;cursor:pointer}
.luxury .btn{background:#556B2F;color:#fff}
.romantic .btn{background:#d46a6a;color:#fff}
.minimal .btn{background:#000;color:#fff}
.royal .btn{background:#FFD700;color:#000}

</style>
</head>

<body>

<div class="text-center p-3 bg-white">
<button onclick="show(0)">Luxury</button>
<button onclick="show(1)">Romantic</button>
<button onclick="show(2)">Minimal</button>
<button onclick="show(3)">Royal</button>
</div>

<!-- ===== 1 LUXURY ===== -->
<div id="s0" class="section luxury active">
<div class="parallax" style="background-image:url('https://images.unsplash.com/photo-1520854221256-17451cc331bf');"></div>

<div class="box text-center">
<h2 class="title text-3xl">أحمد & فاطمة</h2>
<p>10 مايو 2026</p>

<div class="counter">
<div><span id="d0"></span><br>يوم</div>
<div><span id="h0"></span><br>ساعة</div>
<div><span id="m0"></span><br>دقيقة</div>
<div><span id="s0c"></span><br>ثانية</div>
</div>

<button class="btn" onclick="toggleForm(this)">رسالة</button>
<div class="hidden formBox">
<input placeholder="اسمك" class="w-full border p-2 mt-2">
<textarea placeholder="رسالتك" class="w-full border p-2 mt-2"></textarea>
</div>
</div>
</div>

<!-- ===== 2 ROMANTIC ===== -->
<div id="s1" class="section romantic">
<div class="parallax" style="background-image:url('https://images.unsplash.com/photo-1519225421980-715cb0215aed');"></div>

<div class="box text-center">
<h2 class="title text-3xl">Omar & Aisha</h2>

<div class="counter">
<div><span id="d1"></span><br>d</div>
<div><span id="h1"></span><br>h</div>
<div><span id="m1"></span><br>m</div>
<div><span id="s1c"></span><br>s</div>
</div>

<button class="btn" onclick="toggleForm(this)">Message</button>
<div class="hidden formBox">
<input placeholder="Name" class="w-full border p-2 mt-2">
<textarea placeholder="Message" class="w-full border p-2 mt-2"></textarea>
</div>
</div>
</div>

<!-- ===== 3 MINIMAL ===== -->
<div id="s2" class="section minimal">
<div class="parallax" style="background-image:url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc');"></div>

<div class="box text-center">
<h2 class="title text-2xl">Karim & Sara</h2>

<div class="counter">
<div><span id="d2"></span></div>
<div><span id="h2"></span></div>
<div><span id="m2"></span></div>
<div><span id="s2c"></span></div>
</div>

<button class="btn" onclick="toggleForm(this)">Send</button>
<div class="hidden formBox">
<input placeholder="Name" class="w-full border p-2 mt-2">
<textarea placeholder="Message" class="w-full border p-2 mt-2"></textarea>
</div>
</div>
</div>

<!-- ===== 4 ROYAL ===== -->
<div id="s3" class="section royal">
<div class="parallax" style="background-image:url('https://images.unsplash.com/photo-1519741497674-611481863552');"></div>

<div class="box text-center">
<h2 class="title text-3xl">مينا & مريم</h2>
<p>الإكليل 4:00 مساءً</p>

<div class="counter">
<div><span id="d3"></span><br>يوم</div>
<div><span id="h3"></span><br>ساعة</div>
<div><span id="m3"></span><br>دقيقة</div>
<div><span id="s3c"></span><br>ثانية</div>
</div>

<button class="btn" onclick="toggleForm(this)">رسالة</button>
<div class="hidden formBox">
<input placeholder="اسمك" class="w-full border p-2 mt-2">
<textarea placeholder="رسالتك" class="w-full border p-2 mt-2"></textarea>
</div>
</div>
</div>

<script>
function show(i){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById('s'+i).style.display='block';
}

function countdown(prefix,date){
setInterval(()=>{
let diff=new Date(date)-new Date();

document.getElementById("d"+prefix).innerText=Math.floor(diff/(1000*60*60*24));
document.getElementById("h"+prefix).innerText=Math.floor((diff/(1000*60*60))%24);
document.getElementById("m"+prefix).innerText=Math.floor((diff/(1000*60))%60);
document.getElementById("s"+prefix+"c").innerText=Math.floor((diff/1000)%60);
},1000);
}

countdown(0,"May 10 2026");
countdown(1,"June 15 2026");
countdown(2,"July 20 2026");
countdown(3,"August 5 2026");

function toggleForm(btn){
btn.nextElementSibling.classList.toggle("hidden");
}
</script>

</body>
</html>
